<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memphis Generator</title>
    <link rel="stylesheet" href="css/output.css" />

  </head>
  <body
    class="m-0 bg-[#f8fafc] text-[#1e293b] flex flex-col h-screen overflow-hidden"
    style="
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
        background-size: 40px 40px;
    "
>
    <header class="flex justify-between items-center py-[15px] px-[30px] bg-white border-b border-[#e2e8f0] z-10">
        <div class="flex items-center gap-[15px] text-[20px] font-bold">
            <div class="w-[36px] h-[36px] rounded-full flex items-center justify-center relative after:content-[''] after:w-[8px] after:h-[8px] after:bg-white after:rounded-full after:absolute after:right-[8px] after:top-[8px] before:content-[''] before:w-[14px] before:h-[14px] before:border-2 before:border-white before:rounded-full" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);"></div>
            <div>
                Memphis Generator <span class="text-[#22c55e]">🍃</span>
                <div class="text-[11px] text-[#64748b] flex items-center gap-[5px] font-normal mt-[2px] before:content-[''] before:inline-block before:w-[8px] before:h-[8px] before:bg-[#22c55e] before:rounded-full">On-Device</div>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button class="bg-transparent border-none text-[#64748b] cursor-pointer text-[14px] flex items-center gap-[5px] font-semibold" onclick="resetAll()">↺ Reset</button>
            
            <button class="bg-[#2664ff] text-white px-1.5 py-0.5 md:px-4 md:py-2 text-xs lg:text-sm font-bold rounded-lg inline-flex justify-center items-center gap-2 transition-colors duration-300 hover:bg-[#1a4dbd] w-full sm:w-auto">
                <svg
                    class="w-3 h-3 md:w-5 md:h-5"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="3"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <line x1="20" y1="12" x2="4" y2="12"></line>
                    <polyline points="10 18 4 12 10 6"></polyline>
                </svg>
                BACK
            </button>
        </div>
    </header>

    <div class="flex flex-1 p-[20px] gap-[20px] overflow-hidden">
        
        <div class="w-[320px] flex flex-col gap-[15px] overflow-y-auto pr-[5px] [&::-webkit-scrollbar]:w-[6px] [&::-webkit-scrollbar-thumb]:bg-[#cbd5e1] [&::-webkit-scrollbar-thumb]:rounded-[4px]">
            <div class="bg-white border border-[#e2e8f0] rounded-[12px] p-[20px] shadow-[0_2px_4px_rgba(0,0,0,0.02)]">
                <div class="flex justify-between items-center text-[13px] font-bold text-[#334155] mb-[20px] uppercase">
                    <span>🎨 Appearance</span>
                    <button class="bg-transparent border-none text-[#64748b] text-[11px] font-bold cursor-pointer flex items-center gap-[4px]" onclick="randomizeAppearance()">↺ RANDOM</button>
                </div>
                
                <div class="flex justify-between items-center mb-[20px] text-[11px] font-bold text-[#475569] uppercase">
                    <span>Background Layer</span>
                    <label class="relative inline-block w-[40px] h-[22px]">
                        <input type="checkbox" id="bg-toggle" class="peer opacity-0 w-0 h-0 absolute">
                        <span class="absolute cursor-pointer inset-0 bg-[#cbd5e1] transition-all duration-300 rounded-[34px] before:absolute before:content-[''] before:h-[16px] before:w-[16px] before:left-[3px] before:bottom-[3px] before:bg-white before:transition-all before:duration-300 before:rounded-full peer-checked:bg-[#8b5cf6] peer-checked:before:translate-x-[18px]"></span>
                    </label>
                </div>

                <div class="flex justify-between items-center text-[11px] font-bold text-[#475569] uppercase">
                    <span>Colors</span>
                    <div class="flex gap-[8px]">
                        <input type="color" class="w-[24px] h-[24px] border-none rounded-[6px] cursor-pointer p-0 overflow-hidden [&::-webkit-color-swatch-wrapper]:p-0 [&::-webkit-color-swatch]:border-none" value="#0f172a">
                        <input type="color" class="w-[24px] h-[24px] border-none rounded-[6px] cursor-pointer p-0 overflow-hidden [&::-webkit-color-swatch-wrapper]:p-0 [&::-webkit-color-swatch]:border-none" value="#ec4899">
                        <input type="color" class="w-[24px] h-[24px] border-none rounded-[6px] cursor-pointer p-0 overflow-hidden [&::-webkit-color-swatch-wrapper]:p-0 [&::-webkit-color-swatch]:border-none" value="#06b6d4">
                        <input type="color" class="w-[24px] h-[24px] border-none rounded-[6px] cursor-pointer p-0 overflow-hidden [&::-webkit-color-swatch-wrapper]:p-0 [&::-webkit-color-swatch]:border-none" value="#eab308">
                        <input type="color" class="w-[24px] h-[24px] border-none rounded-[6px] cursor-pointer p-0 overflow-hidden [&::-webkit-color-swatch-wrapper]:p-0 [&::-webkit-color-swatch]:border-none" value="#8b5cf6"> 
                    </div>
                </div>
            </div>

            <div class="bg-white border border-[#e2e8f0] rounded-[12px] p-[20px] shadow-[0_2px_4px_rgba(0,0,0,0.02)]">
                <div class="flex justify-between items-center text-[13px] font-bold text-[#334155] mb-[20px] uppercase">
                    <span>☍ Structure</span>
                    <button class="bg-transparent border-none text-[#64748b] text-[11px] font-bold cursor-pointer flex items-center gap-[4px]" onclick="randomizeStructure()">↺ RANDOM</button>
                </div>

                <div class="mb-[20px]">
                    <div class="flex justify-between text-[11px] font-bold text-[#475569] mb-[8px] uppercase"><span>Density</span> <span class="text-[#0f172a] font-extrabold" id="val-density">128</span></div>
                    <input type="range" id="in-density" min="10" max="300" value="128" class="appearance-none w-full bg-transparent [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:h-[14px] [&::-webkit-slider-thumb]:w-[14px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-[#1e293b] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:-mt-[6px] [&::-webkit-slider-runnable-track]:w-full [&::-webkit-slider-runnable-track]:h-[2px] [&::-webkit-slider-runnable-track]:cursor-pointer [&::-webkit-slider-runnable-track]:bg-[#e2e8f0]">
                </div>
                <div class="mb-[20px]">
                    <div class="flex justify-between text-[11px] font-bold text-[#475569] mb-[8px] uppercase"><span>Variation</span> <span class="text-[#0f172a] font-extrabold" id="val-variation">54</span></div>
                    <input type="range" id="in-variation" min="1" max="100" value="54" class="appearance-none w-full bg-transparent [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:h-[14px] [&::-webkit-slider-thumb]:w-[14px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-[#1e293b] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:-mt-[6px] [&::-webkit-slider-runnable-track]:w-full [&::-webkit-slider-runnable-track]:h-[2px] [&::-webkit-slider-runnable-track]:cursor-pointer [&::-webkit-slider-runnable-track]:bg-[#e2e8f0]">
                </div>
                <div class="mb-[20px]">
                    <div class="flex justify-between text-[11px] font-bold text-[#475569] mb-[8px] uppercase"><span>Rotation</span> <span class="text-[#0f172a] font-extrabold" id="val-rotation">221</span></div>
                    <input type="range" id="in-rotation" min="0" max="360" value="221" class="appearance-none w-full bg-transparent [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:h-[14px] [&::-webkit-slider-thumb]:w-[14px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-[#1e293b] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:-mt-[6px] [&::-webkit-slider-runnable-track]:w-full [&::-webkit-slider-runnable-track]:h-[2px] [&::-webkit-slider-runnable-track]:cursor-pointer [&::-webkit-slider-runnable-track]:bg-[#e2e8f0]">
                </div>
                <div class="mb-[20px]">
                    <div class="flex justify-between text-[11px] font-bold text-[#475569] mb-[8px] uppercase"><span>Min Size</span> <span class="text-[#0f172a] font-extrabold" id="val-minsize">34</span></div>
                    <input type="range" id="in-minsize" min="5" max="100" value="34" class="appearance-none w-full bg-transparent [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:h-[14px] [&::-webkit-slider-thumb]:w-[14px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-[#1e293b] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:-mt-[6px] [&::-webkit-slider-runnable-track]:w-full [&::-webkit-slider-runnable-track]:h-[2px] [&::-webkit-slider-runnable-track]:cursor-pointer [&::-webkit-slider-runnable-track]:bg-[#e2e8f0]">
                </div>
                <div class="mb-[20px]">
                    <div class="flex justify-between text-[11px] font-bold text-[#475569] mb-[8px] uppercase"><span>Max Size</span> <span class="text-[#0f172a] font-extrabold" id="val-maxsize">155</span></div>
                    <input type="range" id="in-maxsize" min="50" max="300" value="155" class="appearance-none w-full bg-transparent [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:h-[14px] [&::-webkit-slider-thumb]:w-[14px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-[#1e293b] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:-mt-[6px] [&::-webkit-slider-runnable-track]:w-full [&::-webkit-slider-runnable-track]:h-[2px] [&::-webkit-slider-runnable-track]:cursor-pointer [&::-webkit-slider-runnable-track]:bg-[#e2e8f0]">
                </div>
                <div class="mb-[20px]">
                    <div class="flex justify-between text-[11px] font-bold text-[#475569] mb-[8px] uppercase"><span>Shadow Opacity</span> <span class="text-[#0f172a] font-extrabold" id="val-shadow">30</span></div>
                    <input type="range" id="in-shadow" min="0" max="100" value="30" class="appearance-none w-full bg-transparent [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:h-[14px] [&::-webkit-slider-thumb]:w-[14px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-[#1e293b] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:-mt-[6px] [&::-webkit-slider-runnable-track]:w-full [&::-webkit-slider-runnable-track]:h-[2px] [&::-webkit-slider-runnable-track]:cursor-pointer [&::-webkit-slider-runnable-track]:bg-[#e2e8f0]">
                </div>

                <div class="flex justify-between items-center mt-[25px] mb-[8px] text-[11px] font-bold text-[#475569] uppercase">Shape Style</div>
                <div class="flex bg-[#f1f5f9] rounded-[8px] p-[4px]" id="shape-style-group">
                    <button class="flex-1 border-none bg-transparent py-[8px] px-0 text-[12px] font-semibold text-[#64748b] cursor-pointer rounded-[6px] transition duration-200 [&.active]:bg-white [&.active]:text-[#1e293b] [&.active]:shadow-[0_1px_3px_rgba(0,0,0,0.1)]" data-val="solid">Solid</button>
                    <button class="flex-1 border-none bg-transparent py-[8px] px-0 text-[12px] font-semibold text-[#64748b] cursor-pointer rounded-[6px] transition duration-200 [&.active]:bg-white [&.active]:text-[#1e293b] [&.active]:shadow-[0_1px_3px_rgba(0,0,0,0.1)]" data-val="outline">Outline</button>
                    <button class="flex-1 border-none bg-transparent py-[8px] px-0 text-[12px] font-semibold text-[#64748b] cursor-pointer rounded-[6px] transition duration-200 [&.active]:bg-white [&.active]:text-[#1e293b] [&.active]:shadow-[0_1px_3px_rgba(0,0,0,0.1)] active" data-val="mixed">Mixed</button>
                </div>
            </div>
        </div>

        <div class="flex-1 bg-white border border-[#e2e8f0] rounded-[12px] flex flex-col overflow-hidden relative shadow-[0_4px_6px_rgba(0,0,0,0.02)]">
            <div class="p-[15px_20px] flex justify-between items-center border-b border-[#e2e8f0]">
                <div class="text-[14px] font-bold text-[#334155] flex items-center gap-[8px]">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    Live Preview
                </div>
                <div class="flex gap-[10px]">
                    <button class="bg-white border border-[#e2e8f0] py-[8px] px-[16px] rounded-[6px] text-[12px] font-bold cursor-pointer text-[#475569] flex items-center gap-[6px]" onclick="shuffleAssets()">🔀 SHUFFLE</button>
                    <button class="bg-[#fb7185] hover:bg-[#e11d48] border-none text-white py-[8px] px-[16px] rounded-[6px] text-[12px] font-bold cursor-pointer flex items-center gap-[6px] shadow-[0_2px_4px_rgba(251,113,133,0.3)]" onclick="saveAsImage()">📥 SAVE IMAGE</button>
                </div>
            </div>

            <div class="flex-1 relative overflow-hidden" id="preview-area"
                 style="
                    background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
                    background-size: 20px 20px; 
                    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
                 ">
            </div>

            <div class="p-[12px_20px] border-t border-[#e2e8f0] flex justify-between items-center bg-[#fafafa]">
                <div class="font-mono text-[11px] text-[#64748b] whitespace-nowrap overflow-hidden text-ellipsis max-w-[70%]" id="code-snippet">&lt;svg&gt;...&lt;/svg&gt;</div>
                <button class="bg-white border border-[#e2e8f0] py-[6px] px-[12px] rounded-[6px] text-[12px] font-semibold cursor-pointer flex items-center gap-[6px]" onclick="copySVG()">📄 Copy SVG</button>
            </div>
        </div>
    </div>

    <script>
        const previewArea = document.getElementById('preview-area');
        const bgToggle = document.getElementById('bg-toggle');
        const colorPickers = document.querySelectorAll('.color-picker');
        const styleBtns = document.querySelectorAll('.style-btn');
        const codeSnippet = document.getElementById('code-snippet');

        const inputs = {
            density: document.getElementById('in-density'),
            variation: document.getElementById('in-variation'),
            rotation: document.getElementById('in-rotation'),
            minSize: document.getElementById('in-minsize'),
            maxSize: document.getElementById('in-maxsize'),
            shadow: document.getElementById('in-shadow'),
        };

        let currentShapeStyle = 'mixed';
        let svgString = '';
        
        // --- DATA SEED STABIL (TIDAK AKAN MENGACAK SAAT SLIDER DIGESER) ---
        let maxElements = 300; 
        let elementsData = []; 

        const SHAPES = [
            `<circle cx="0" cy="0" r="0.5" />`, // Shape Dasar 0
            `<rect x="-0.4" y="-0.4" width="0.8" height="0.8" />`, // Shape 1
            `<polygon points="0,-0.5 0.5,0.4 -0.5,0.4" />`, // Shape 2
            `<path d="M -0.1,-0.4 L 0.1,-0.4 L 0.1,-0.1 L 0.4,-0.1 L 0.4,0.1 L 0.1,0.1 L 0.1,0.4 L -0.1,0.4 L -0.1,0.1 L -0.4,0.1 L -0.4,-0.1 L -0.1,-0.1 Z" />`, // Shape 3
            `<path d="M -0.4,-0.2 Q -0.2,0.3 0,0 T 0.4,0.2" fill="none" stroke-linecap="round" stroke-linejoin="round" />`, // Shape 4 (Squiggle)
            `<rect x="-0.5" y="-0.2" width="1" height="0.4" rx="0.2" />` // Shape 5
        ];

        // Melempar aset ke memori 1 KALI SAJA
        function generateSeed() {
            elementsData = [];
            for (let i = 0; i < maxElements; i++) {
                elementsData.push({
                    x: Math.random() * 1920,
                    y: Math.random() * 1080,
                    shapeType: Math.floor(Math.random() * SHAPES.length), // Sifat bentuk asli
                    colorIndex: Math.floor(Math.random() * 5), // Tetap mengikat ke 1 dari 5 warna
                    baseRot: Math.random() * 360, // Rotasi dasar
                    sizeF: Math.random(), // Skala ukuran dasar
                    isOutline: Math.random() > 0.5 // Status garis untuk style mixed
                });
            }
        }

        // Fungsi Render yang membaca instruksi dari Slider
        function renderMemphis() {
            const colors = Array.from(colorPickers).map(p => p.value);
            const hasBg = bgToggle.checked;
            
            const density = parseInt(inputs.density.value);
            const variation = parseInt(inputs.variation.value);
            const rotationOffset = parseInt(inputs.rotation.value);
            const minSize = parseInt(inputs.minSize.value);
            const maxSize = Math.max(parseInt(inputs.maxSize.value), minSize); // Cegah error ukuran minus
            const shadowOp = parseInt(inputs.shadow.value) / 100;

            // Batas Toleransi Bentuk (Variation)
            const allowedShapesCount = Math.max(1, Math.ceil((variation / 100) * SHAPES.length));

            const width = 1920;
            const height = 1080;

            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="100%" height="100%">`;
            
            if (shadowOp > 0) {
                svgContent += `<defs><filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="8" dy="12" stdDeviation="6" flood-color="#000" flood-opacity="${shadowOp}"/></filter></defs>`;
            }
            if (hasBg) {
                svgContent += `<rect width="100%" height="100%" fill="#ffffff" />`;
            }

            // Loop HANYA sepanjang Density (Sesuai instruksi Anda)
            for (let i = 0; i < density; i++) {
                let data = elementsData[i];

                // VARIATION: Jika bentuk asli dilarang oleh slider, paksa jadi bentuk dasar (Lingkaran)
                let shapeIndex = data.shapeType < allowedShapesCount ? data.shapeType : 0;
                let shapeCode = SHAPES[shapeIndex];

                // COLOR
                let color = colors[data.colorIndex];

                // SIZE
                let size = minSize + (data.sizeF * (maxSize - minSize));

                // ROTATION: Putar secara halus dari posisi dasar
                let rot = data.baseRot + rotationOffset;

                // STYLE: Tentukan isi atau garis
                let isSolid = currentShapeStyle === 'solid';
                if (currentShapeStyle === 'mixed') isSolid = !data.isOutline;
                if (shapeIndex === 4) isSolid = false; // Squiggle wajid outline

                let fillProp = isSolid ? color : 'none';
                let strokeProp = isSolid ? 'none' : color;
                let strokeWidth = isSolid ? 0 : Math.max(4, size * 0.15);
                let shadowFilter = shadowOp > 0 ? `filter="url(#drop-shadow)"` : '';

                svgContent += `
                <g transform="translate(${data.x}, ${data.y}) rotate(${rot}) scale(${size})" ${shadowFilter}>
                    <g fill="${fillProp}" stroke="${strokeProp}" stroke-width="${strokeWidth / size}">
                        ${shapeCode}
                    </g>
                </g>`;
            }

            svgContent += `</svg>`;
            svgString = svgContent;
            
            previewArea.innerHTML = svgContent;
            codeSnippet.innerText = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">...${density} elements...</svg>`;
        }

        // === EVENT LISTENERS ===
        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                document.getElementById(`val-${key.toLowerCase()}`).innerText = e.target.value;
                renderMemphis(); // Render ulang dengan formasi yang stabil!
            });
        });

        bgToggle.addEventListener('change', renderMemphis);
        colorPickers.forEach(p => p.addEventListener('input', renderMemphis));

        styleBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                styleBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentShapeStyle = this.getAttribute('data-val');
                renderMemphis();
            });
        });

        // === FUNGSI TOMBOL ===
        function shuffleAssets() {
            generateSeed(); // Tombol ini satu-satunya jalan untuk mengacak formasi secara paksa
            renderMemphis(); 
        }

        function randomizeAppearance() {
            colorPickers.forEach(p => { p.value = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'); });
            bgToggle.checked = Math.random() > 0.5;
            renderMemphis(); 
        }

        function randomizeStructure() {
            inputs.density.value = Math.floor(Math.random() * (300 - 10 + 1)) + 10;
            inputs.variation.value = Math.floor(Math.random() * 100) + 1;
            inputs.rotation.value = Math.floor(Math.random() * 360);
            inputs.minSize.value = Math.floor(Math.random() * (50 - 5 + 1)) + 5;
            inputs.maxSize.value = Math.floor(Math.random() * (300 - 50 + 1)) + 50;
            inputs.shadow.value = Math.floor(Math.random() * 100);

            Object.keys(inputs).forEach(key => {
                document.getElementById(`val-${key.toLowerCase()}`).innerText = inputs[key].value;
            });
            
            // Render tanpa mengacak posisi
            renderMemphis();
        }

        function resetAll() {
            const defColors = ["#0f172a", "#ec4899", "#06b6d4", "#eab308", "#8b5cf6"];
            colorPickers.forEach((p, i) => p.value = defColors[i]);
            bgToggle.checked = false;

            inputs.density.value = 128;
            inputs.variation.value = 54;
            inputs.rotation.value = 221;
            inputs.minSize.value = 34;
            inputs.maxSize.value = 155;
            inputs.shadow.value = 30;

            Object.keys(inputs).forEach(key => { document.getElementById(`val-${key.toLowerCase()}`).innerText = inputs[key].value; });

            styleBtns.forEach(b => b.classList.remove('active'));
            styleBtns[2].classList.add('active');
            currentShapeStyle = 'mixed';

            shuffleAssets();
        }

        function copySVG() {
            navigator.clipboard.writeText(svgString).then(() => {
                const btn = document.querySelector('.btn-copy');
                const oriText = btn.innerText;
                btn.innerText = '✅ Copied!';
                setTimeout(() => btn.innerText = oriText, 2000);
            });
        }

        function saveAsImage() {
            const canvas = document.createElement("canvas");
            canvas.width = 1920; 
            canvas.height = 1080;
            const ctx = canvas.getContext("2d");
            
            const img = new Image();
            const svgBlob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                const pngUrl = canvas.toDataURL("image/png");
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = 'memphis-asset.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        // Inisiasi
        generateSeed();
        renderMemphis();

    </script>
</bod>
</html>
