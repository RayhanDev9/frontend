<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrasi - Mading Kampus</title>
    <link rel="stylesheet" href="css/output.css">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  
  <body class="bg-[#f5f7fa] text-gray-700 flex items-center justify-center min-h-[90vh] p-4 antialiased">
    
    <div class="flex flex-col bg-white items-center w-[90%] sm:max-w-md p-6 border border-gray-200 rounded-2xl shadow-xl sm:p-8 transition duration-300">
      <h2 class="text-2xl font-semibold text-black mb-6 text-center tracking-wide">Buat Akun Baru</h2>

      <div id="pesan-notif" class="hidden px-4 py-2 rounded mb-4 text-sm text-center font-medium"></div>

      <form id="form-register" class="space-y-4 w-full">
        
        <div>
          <label class="text-xs sm:text-sm font-bold text-gray-600 block mb-1">Nama Lengkap</label>
          <div class="relative flex items-center">
            <div class="absolute left-3 text-gray-400 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
              </svg>
            </div>
            <input
              type="text"
              id="nama_lengkap"
              required
              class="w-full bg-gray-50 text-black border border-gray-300 rounded-lg py-2 pl-10 pr-4 sm:py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition placeholder-gray-400 text-sm"
              placeholder="Masukkan nama lengkap Anda"
            />
          </div>
        </div>

        <div>
          <label class="text-xs sm:text-sm font-bold text-gray-600 block mb-1">Username</label>
          <div class="relative flex items-center">
            <div class="absolute left-3 text-gray-400 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
              </svg>
            </div>
            <input
              type="text"
              id="username"
              required
              class="w-full bg-gray-50 text-black border border-gray-300 rounded-lg py-2 pl-10 pr-4 sm:py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition placeholder-gray-400 text-sm"
              placeholder="Masukkan username Anda"
            />
          </div>
        </div>

        <div>
          <label class="text-xs sm:text-sm font-bold text-gray-600 block mb-1">Password</label>
          <div class="relative flex items-center">
            <div class="absolute left-3 text-gray-400 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
              </svg>
            </div>
            <input
              type="password"
              id="password"
              required
              class="w-full text-black border bg-gray-50 border-gray-300 rounded-lg py-2 pl-10 pr-4 sm:py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition placeholder-gray-400 text-sm"
              placeholder="Masukkan sandi Anda"
            />
          </div>
        </div>

        <div>
          <label class="text-xs sm:text-sm font-bold text-gray-600 block mb-1">Daftar Sebagai</label>
          <select
            id="role"
            class="w-[75%] bg-gray-50 text-black border border-gray-300 rounded-lg px-4 py-2 sm:py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition cursor-pointer [&>option]:bg-white [&>option]:text-gray-900 capitalize"
          >
            <option value="mahasiswa">Mahasiswa (Pengunjung)</option>
            <option value="admin" id="opsi-admin">Admin (Pembuat Acara)</option>
          </select>
          
          <p id="teks-admin-tutup" class="text-xs text-gray-500 mt-1 hidden">
            *Pendaftaran admin telah ditutup karena admin utama sudah terdaftar.
          </p>
        </div>

        <button
          type="submit"
          id="tombol-register"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg mt-4 transition duration-200 shadow-md text-sm"
        >
          Daftar
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Sudah punya akun?
        <a href="login.html" class="text-blue-600 hover:text-blue-700 hover:underline font-medium transition ml-1"
          >Login di sini</a
        >
      </p>
    </div>

    <script src="js/register.js"></script>
  </body>
</html>
